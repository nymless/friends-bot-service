services:
  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    environment:
      PORT: ${METRICS_PORT:-8001}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL:-15s}
    volumes:
      - ./ops/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed -e "s/__PORT__/$$PORT/" -e "s/__SCRAPE_INTERVAL__/$$SCRAPE_INTERVAL/" \
          /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
