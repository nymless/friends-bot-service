services:
  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    environment:
      # monitoring-up: PORT. monitoring-up-load: LOAD_APP_PORT from .env.load
      PORT: ${LOAD_APP_PORT:-${PORT:-8000}}
    volumes:
      - ./ops/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/__PORT__/$$PORT/" /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
