# compose.load.yml — VPS-like load-test profile (one cgroup, CPU/RAM limits).
#
# Two AB pairs (rebuild APP_IMAGE after checkout, reset DB when schema differs):
#   AB polling — NGINX_ENABLED=0, BOT_MODE=polling, scrape :LOAD_APP_PORT/metrics (webhook only)
#   AB webhook — NGINX_ENABLED=1, BOT_MODE=webhook, k6 → http://localhost:LOAD_HTTP_PORT
#
# Switching main ↔ workers: make load-down-v, rebuild image, load-up (migrations differ).
services:
  telegram-mock:
    image: friends-bot-telegram-mock:local
    build:
      context: .
      dockerfile: load/telegram-mock/Dockerfile

  vps-sim:
    image: friends-bot-vps-sim:local
    build:
      context: .
      dockerfile: load/vps-sim/Dockerfile
      args:
        APP_IMAGE: ${APP_IMAGE:-friends-bot-service:local}
    depends_on:
      - telegram-mock
    env_file:
      - path: .env.load
        required: false
    environment:
      TELEGRAM_API_BASE_URL: http://telegram-mock:8081
      # Derived from POSTGRES_* in .env.load (for app, alembic, make load-seed exec).
      DB_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB}
    ports:
      - "${LOAD_HTTP_PORT:-8080}:80"
      - "${LOAD_APP_PORT:-8000}:8000"
    volumes:
      - vps_sim_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "${VPS_SIM_CPUS:-1}"
          memory: ${VPS_SIM_MEMORY:-2g}

volumes:
  vps_sim_pgdata:
